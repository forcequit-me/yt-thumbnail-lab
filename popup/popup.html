<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="stack">
      <button id="toggle" class="power" aria-label="Toggle Simulator">
        <svg viewBox="0 0 24 24" width="40" height="40" aria-hidden="true">
          <path
            d="M12 3v10"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            fill="none"
          />
          <path
            d="M7.5 6.5a7 7 0 1 0 9 0"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            fill="none"
          />
        </svg>
      </button>

      <!-- B&W toggle slider (was main feature, now secondary) -->
      <div class="sim-toggle-row">
        <span class="sim-label">B&amp;W</span>
        <label class="switch" id="bw-switch-label">
          <input type="checkbox" id="bw-enabled" />
          <span class="slider"></span>
        </label>
      </div>

      <!-- Collapsible simulator settings -->
      <div id="sim-panel" class="sim-panel" hidden>
        <!-- Highlight row (top of panel) -->
        <div class="sim-highlight-row">
          <button
            id="sim-highlight-btn"
            class="hl-pill"
            type="button"
            title="Toggle highlight overlay"
            aria-pressed="true"
          >
            <span class="hl-pill-icon" aria-hidden="true">
              <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor">
                <path d="M2 11.5A.5.5 0 0 1 2.5 11h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5z"/>
                <path d="M3.5 7.293l4.5-4.5 4.5 4.5L11 8.793 8.5 6.293V13h-1V6.293L5 8.793 3.5 7.293z"/>
              </svg>
            </span>
            <span class="hl-pill-label">Highlight</span>
            <span class="hl-pill-dot" aria-hidden="true"></span>
          </button>
          <input type="color" id="sim-highlight-color" value="#00ff88" title="Highlight color" />
        </div>

        <!-- Global Position Controls -->
        <div class="pos-global-row">
          <span class="sim-label">Position</span>
          <div class="pos-pad">
            <button type="button" class="pos-btn" data-dir="prev" aria-label="Previous">&lt;</button>
            <button type="button" class="pos-btn" data-dir="center" aria-label="Recenter">Recenter</button>
            <button type="button" class="pos-btn" data-dir="next" aria-label="Next">&gt;</button>
          </div>
        </div>

        <!-- Compact image upload row -->
        <div class="upload-row">
          <div class="upload-slot" id="thumb-slot">
            <input type="file" id="sim-thumb" accept="image/*" tabindex="-1" />
            <button type="button" class="upload-btn" id="thumb-pick-btn" title="Choose thumbnail">
              <span class="upload-icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="1" y="3" width="14" height="10" rx="1.5"/>
                  <path d="M1 10l4-3.5 3 2.5 2.5-2 3.5 3"/>
                  <circle cx="11.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
                </svg>
              </span>
              <span class="upload-label" id="thumb-label">Thumbnail</span>
            </button>
            <button type="button" class="upload-clear" id="thumb-clear-btn" hidden title="Clear thumbnail">&#x2715;</button>
          </div>
          <div class="upload-slot" id="avatar-slot">
            <input type="file" id="sim-avatar" accept="image/*" tabindex="-1" />
            <button type="button" class="upload-btn" id="avatar-pick-btn" title="Choose channel avatar">
              <span class="upload-icon" aria-hidden="true">
                <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="8" cy="6" r="3"/>
                  <path d="M2 14c0-3 2.7-5 6-5s6 2 6 5"/>
                </svg>
              </span>
              <span class="upload-label" id="avatar-label">Avatar</span>
            </button>
            <button type="button" class="upload-clear" id="avatar-clear-btn" hidden title="Clear avatar">&#x2715;</button>
          </div>
        </div>

        <!-- Composite preview: thumbnail + avatar badge -->
        <div class="img-preview" id="img-preview" hidden>
          <img id="sim-thumb-preview" class="img-preview-thumb" alt="" />
          <img id="sim-avatar-preview" class="img-preview-avatar" alt="" hidden />
        </div>

        <label class="sim-field">
          <span>Title</span>
          <input type="text" id="sim-title" maxlength="100" />
        </label>

        <div class="sim-pair">
          <label class="sim-field sim-grow">
            <span>Channel</span>
            <input type="text" id="sim-channel" maxlength="50" />
          </label>
          <label class="sim-field sim-shrink">
            <span>Duration</span>
            <input type="text" id="sim-duration" placeholder="10:24" maxlength="10" />
          </label>
        </div>

        <label class="sim-field">
          <span>Views · Age</span>
          <input type="text" id="sim-meta" placeholder="1.2M views • 3 days ago" maxlength="60" />
        </label>

        <label class="sim-field">
          <span>Description (search only)</span>
          <textarea id="sim-description" rows="2" maxlength="300" placeholder="First lines of description..."></textarea>
        </label>



        <!-- Templates -->
        <details class="sim-section">
          <summary>Templates (A/B)</summary>
          <div class="sim-section-body">
            <div class="tpl-row">
              <select id="tpl-select" class="tpl-select">
                <option value="">— select —</option>
              </select>
              <button id="tpl-load" class="sim-mini" type="button">Load</button>
              <button id="tpl-delete" class="sim-mini" type="button">Delete</button>
            </div>
            <div class="tpl-row">
              <input id="tpl-name" type="text" maxlength="40" placeholder="Template name" class="tpl-name" />
              <button id="tpl-save" class="sim-mini" type="button">Save</button>
            </div>
          </div>
        </details>

        <div class="sim-row">
          <span class="sim-spacer"></span>
          <button id="sim-save-default" class="sim-mini" type="button" title="Save current values as your quick-slot default">
            Save default
          </button>
          <button id="sim-reset-default" class="sim-mini" type="button" title="Reload your saved default">
            Reset
          </button>
        </div>
      </div>

      <button
        id="help-btn"
        class="help"
        type="button"
        aria-label="About YT Thumbnail Lab"
      >
        ?
      </button>
    </div>

    <div id="help-panel" class="help-panel" hidden>
      <button id="help-close" class="help-close" aria-label="Close">×</button>
      <p class="help-line">
        Power button toggles the Simulator. B&amp;W slider turns every YouTube thumbnail to grayscale.
      </p>
      <ul class="help-list">
        <li><b>B&amp;W shortcut:</b> <kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>B</kbd></li>
        <li><b>Simulator shortcut:</b> <kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>S</kbd></li>
        <li><b>Right-click</b> any YouTube page to toggle B&amp;W or Simulator.</li>
        <li><b>Templates</b> save sim configs for A/B testing.</li>
      </ul>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
